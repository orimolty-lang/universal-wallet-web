<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OMNI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #000;
      color: white;
      min-height: 100vh;
      overflow: hidden;
      touch-action: pan-y;
    }
    
    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Top section with balance */
    .header {
      padding: 60px 24px 20px;
      text-align: center;
    }
    
    .balance-small {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .balance-big {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
    }
    
    /* Token Universe - the main interactive area */
    .universe {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    
    /* Floating Token Orbs */
    .token-orb {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      transition: transform 0.1s ease-out, box-shadow 0.3s ease;
      user-select: none;
    }
    
    .token-orb:active {
      cursor: grabbing;
    }
    
    .token-orb::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: inherit;
      filter: blur(20px);
      opacity: 0.5;
      z-index: -1;
    }
    
    .token-orb.dragging {
      z-index: 1000;
      transform: scale(1.15);
    }
    
    .token-orb .symbol {
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    
    .token-orb .value {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .token-orb:hover .value,
    .token-orb.dragging .value {
      opacity: 1;
    }
    
    /* Token Detail Panel - slides up when token tapped */
    .detail-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      border-radius: 32px 32px 0 0;
      padding: 24px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 500;
    }
    
    .detail-panel.open {
      transform: translateY(0);
    }
    
    .detail-handle {
      width: 36px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 0 auto 24px;
    }
    
    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .detail-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
    }
    
    .detail-info h2 {
      font-size: 24px;
      font-weight: 700;
    }
    
    .detail-info p {
      color: #666;
      font-size: 14px;
    }
    
    .detail-balance {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .detail-usd {
      font-size: 18px;
      color: #666;
      margin-bottom: 32px;
    }
    
    .detail-actions {
      display: flex;
      gap: 12px;
    }
    
    .detail-btn {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    
    .detail-btn:active {
      transform: scale(0.96);
    }
    
    .detail-btn.primary {
      background: #a855f7;
      color: white;
    }
    
    .detail-btn.secondary {
      background: #222;
      color: white;
    }
    
    /* Gravity hint */
    .hint {
      position: fixed;
      bottom: 100px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #444;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    /* Quick Actions Bar */
    .quick-bar {
      position: fixed;
      bottom: 40px;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    
    .quick-action {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #111;
      border: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .quick-action:hover {
      background: #1a1a1a;
      transform: scale(1.05);
    }
    
    .quick-action:active {
      transform: scale(0.95);
    }
    
    /* Overlay for closing detail */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 400;
    }
    
    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="balance-small">Total Balance</div>
      <div class="balance-big">$12,847</div>
    </div>
    
    <div class="universe" id="universe">
      <!-- Token orbs will be created by JS -->
    </div>
    
    <div class="hint">drag tokens • tap for details</div>
    
    <div class="quick-bar">
      <div class="quick-action">↓</div>
      <div class="quick-action">↑</div>
      <div class="quick-action">⇄</div>
    </div>
  </div>
  
  <div class="overlay" id="overlay"></div>
  
  <div class="detail-panel" id="detailPanel">
    <div class="detail-handle"></div>
    <div class="detail-header">
      <div class="detail-icon" id="detailIcon">Ξ</div>
      <div class="detail-info">
        <h2 id="detailName">Ethereum</h2>
        <p id="detailSymbol">ETH</p>
      </div>
    </div>
    <div class="detail-balance" id="detailBalance">2.4521 ETH</div>
    <div class="detail-usd" id="detailUsd">$4,847.23</div>
    <div class="detail-actions">
      <button class="detail-btn secondary">Send</button>
      <button class="detail-btn primary">Swap</button>
    </div>
  </div>

  <script>
    const tokens = [
      { symbol: 'Ξ', name: 'Ethereum', short: 'ETH', balance: '2.4521', usd: '$4,847', color: '#627eea', size: 90 },
      { symbol: '₿', name: 'Bitcoin', short: 'BTC', balance: '0.0821', usd: '$5,234', color: '#f7931a', size: 85 },
      { symbol: '$', name: 'USDC', short: 'USDC', balance: '2,500', usd: '$2,500', color: '#2775ca', size: 75 },
      { symbol: '◎', name: 'Solana', short: 'SOL', balance: '12.34', usd: '$266', color: '#9945ff', size: 65 },
      { symbol: 'Ⓐ', name: 'Arbitrum', short: 'ARB', balance: '450', usd: '$180', color: '#28a0f0', size: 55 },
    ];
    
    const universe = document.getElementById('universe');
    const overlay = document.getElementById('overlay');
    const detailPanel = document.getElementById('detailPanel');
    const orbs = [];
    
    // Physics
    const friction = 0.96;
    const bounce = 0.7;
    const gravity = 0.15;
    
    class TokenOrb {
      constructor(token, index) {
        this.token = token;
        this.size = token.size;
        
        // Random starting position
        const rect = universe.getBoundingClientRect();
        this.x = rect.width * 0.2 + Math.random() * rect.width * 0.6;
        this.y = rect.height * 0.2 + Math.random() * rect.height * 0.4;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        
        // Create DOM element
        this.el = document.createElement('div');
        this.el.className = 'token-orb';
        this.el.style.width = this.size + 'px';
        this.el.style.height = this.size + 'px';
        this.el.style.background = token.color;
        this.el.innerHTML = `
          <span class="symbol">${token.symbol}</span>
          <span class="value">${token.usd}</span>
        `;
        
        universe.appendChild(this.el);
        
        this.dragging = false;
        this.setupDrag();
        this.setupTap();
      }
      
      setupDrag() {
        let startX, startY, startPosX, startPosY;
        
        const onStart = (e) => {
          e.preventDefault();
          this.dragging = true;
          this.el.classList.add('dragging');
          const point = e.touches ? e.touches[0] : e;
          startX = point.clientX;
          startY = point.clientY;
          startPosX = this.x;
          startPosY = this.y;
          this.vx = 0;
          this.vy = 0;
        };
        
        const onMove = (e) => {
          if (!this.dragging) return;
          const point = e.touches ? e.touches[0] : e;
          const dx = point.clientX - startX;
          const dy = point.clientY - startY;
          this.x = startPosX + dx;
          this.y = startPosY + dy;
          this.vx = dx * 0.1;
          this.vy = dy * 0.1;
        };
        
        const onEnd = () => {
          this.dragging = false;
          this.el.classList.remove('dragging');
        };
        
        this.el.addEventListener('mousedown', onStart);
        this.el.addEventListener('touchstart', onStart, { passive: false });
        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, { passive: true });
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchend', onEnd);
      }
      
      setupTap() {
        let startTime;
        this.el.addEventListener('touchstart', () => { startTime = Date.now(); });
        this.el.addEventListener('mousedown', () => { startTime = Date.now(); });
        
        const onTap = () => {
          if (Date.now() - startTime < 200) {
            this.showDetail();
          }
        };
        
        this.el.addEventListener('touchend', onTap);
        this.el.addEventListener('mouseup', onTap);
      }
      
      showDetail() {
        document.getElementById('detailIcon').textContent = this.token.symbol;
        document.getElementById('detailIcon').style.background = this.token.color;
        document.getElementById('detailName').textContent = this.token.name;
        document.getElementById('detailSymbol').textContent = this.token.short;
        document.getElementById('detailBalance').textContent = this.token.balance + ' ' + this.token.short;
        document.getElementById('detailUsd').textContent = this.token.usd;
        
        detailPanel.classList.add('open');
        overlay.classList.add('visible');
      }
      
      update() {
        if (this.dragging) {
          this.render();
          return;
        }
        
        // Apply gravity
        this.vy += gravity;
        
        // Apply velocity
        this.x += this.vx;
        this.y += this.vy;
        
        // Apply friction
        this.vx *= friction;
        this.vy *= friction;
        
        // Bounds
        const rect = universe.getBoundingClientRect();
        const r = this.size / 2;
        
        if (this.x - r < 0) { this.x = r; this.vx *= -bounce; }
        if (this.x + r > rect.width) { this.x = rect.width - r; this.vx *= -bounce; }
        if (this.y - r < 0) { this.y = r; this.vy *= -bounce; }
        if (this.y + r > rect.height) { this.y = rect.height - r; this.vy *= -bounce; }
        
        this.render();
      }
      
      render() {
        this.el.style.left = (this.x - this.size / 2) + 'px';
        this.el.style.top = (this.y - this.size / 2) + 'px';
      }
    }
    
    // Create orbs
    tokens.forEach((token, i) => {
      orbs.push(new TokenOrb(token, i));
    });
    
    // Animation loop
    function animate() {
      orbs.forEach(orb => orb.update());
      requestAnimationFrame(animate);
    }
    animate();
    
    // Close detail panel
    overlay.addEventListener('click', () => {
      detailPanel.classList.remove('open');
      overlay.classList.remove('visible');
    });
    
    // Collision detection between orbs
    function checkCollisions() {
      for (let i = 0; i < orbs.length; i++) {
        for (let j = i + 1; j < orbs.length; j++) {
          const a = orbs[i];
          const b = orbs[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = (a.size + b.size) / 2;
          
          if (dist < minDist) {
            const angle = Math.atan2(dy, dx);
            const overlap = minDist - dist;
            
            // Separate
            a.x -= Math.cos(angle) * overlap * 0.5;
            a.y -= Math.sin(angle) * overlap * 0.5;
            b.x += Math.cos(angle) * overlap * 0.5;
            b.y += Math.sin(angle) * overlap * 0.5;
            
            // Bounce
            const nx = dx / dist;
            const ny = dy / dist;
            const p = a.vx * nx + a.vy * ny - b.vx * nx - b.vy * ny;
            a.vx -= p * nx * 0.5;
            a.vy -= p * ny * 0.5;
            b.vx += p * nx * 0.5;
            b.vy += p * ny * 0.5;
          }
        }
      }
    }
    
    setInterval(checkCollisions, 16);
  </script>
</body>
</html>
