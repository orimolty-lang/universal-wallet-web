<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OMNI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --accent: #a855f7;
      --bg: #000;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Animated Ambient Background */
    .ambient {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      overflow: hidden;
    }
    
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 8s ease-in-out infinite;
    }
    
    .orb-1 {
      width: 300px;
      height: 300px;
      background: var(--accent);
      top: -100px;
      right: -100px;
      animation-delay: 0s;
    }
    
    .orb-2 {
      width: 250px;
      height: 250px;
      background: #3b82f6;
      bottom: 20%;
      left: -80px;
      animation-delay: -3s;
    }
    
    .orb-3 {
      width: 200px;
      height: 200px;
      background: #ec4899;
      top: 40%;
      right: -60px;
      animation-delay: -5s;
      opacity: 0.3;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    
    /* Content */
    .content {
      position: relative;
      z-index: 1;
      padding: 60px 24px 120px;
      min-height: 100vh;
    }
    
    /* Balance Section */
    .balance-section {
      text-align: center;
      padding: 40px 0 50px;
    }
    
    .balance-label {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .balance {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 0.8s ease-out;
    }
    
    .balance-change {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      color: #22c55e;
      font-weight: 500;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    
    .balance-change::before {
      content: '↑';
      font-size: 12px;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Actions - Floating Pills */
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 50px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    
    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }
    
    .action-btn:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }
    
    .action-btn:active {
      transform: scale(0.96);
    }
    
    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    .action-btn.primary:hover {
      background: #9333ea;
      box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
    }
    
    .action-icon {
      font-size: 16px;
    }
    
    /* Tokens */
    .tokens-section {
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .token-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .token {
      display: flex;
      align-items: center;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      transition: all 0.3s ease;
      cursor: pointer;
      animation: tokenSlide 0.5s ease-out both;
    }
    
    .token:nth-child(1) { animation-delay: 0.35s; }
    .token:nth-child(2) { animation-delay: 0.4s; }
    .token:nth-child(3) { animation-delay: 0.45s; }
    .token:nth-child(4) { animation-delay: 0.5s; }
    
    @keyframes tokenSlide {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .token:hover {
      background: rgba(255,255,255,0.06);
    }
    
    .token:active {
      transform: scale(0.98);
    }
    
    .token-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      margin-right: 14px;
      position: relative;
    }
    
    .token-icon.eth {
      background: linear-gradient(135deg, #627eea, #3b5998);
    }
    
    .token-icon.btc {
      background: linear-gradient(135deg, #f7931a, #ff6b00);
    }
    
    .token-icon.usdc {
      background: linear-gradient(135deg, #2775ca, #1a5fb4);
    }
    
    .token-icon.sol {
      background: linear-gradient(135deg, #9945ff, #14f195);
    }
    
    /* Pulse ring animation for main token */
    .token:first-child .token-icon::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      animation: pulse-ring 2s ease-out infinite;
    }
    
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    
    .token-info {
      flex: 1;
    }
    
    .token-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .token-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }
    
    .token-value {
      text-align: right;
    }
    
    .token-balance {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .token-usd {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }
    
    /* Quick Access */
    .quick-access {
      margin-top: 40px;
      animation: fadeInUp 0.8s ease-out 0.55s both;
    }
    
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .quick-card {
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .quick-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }
    
    .quick-card:active {
      transform: scale(0.97);
    }
    
    .quick-icon {
      font-size: 28px;
      margin-bottom: 12px;
    }
    
    .quick-label {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .quick-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    
    /* Bottom Nav - Minimal */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 30px 34px;
      display: flex;
      justify-content: space-around;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
      z-index: 100;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: rgba(255,255,255,0.4);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      padding: 8px 16px;
    }
    
    .nav-item:active {
      transform: scale(0.9);
    }
    
    .nav-item.active {
      color: white;
    }
    
    .nav-icon {
      font-size: 24px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .nav-item.active .nav-icon {
      transform: scale(1.1);
    }
    
    /* Active indicator dot */
    .nav-item.active::after {
      content: '';
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: 2px;
      animation: popIn 0.3s ease-out;
    }
    
    @keyframes popIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
    
    /* Number counting animation */
    .counting {
      animation: countPulse 0.1s ease-in-out;
    }
    
    @keyframes countPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <!-- Ambient Background -->
  <div class="ambient">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  
  <div class="content">
    <!-- Balance -->
    <div class="balance-section">
      <div class="balance-label">Total Balance</div>
      <div class="balance" id="balance">$0.00</div>
      <div class="balance-change">$847.23 today</div>
    </div>
    
    <!-- Actions -->
    <div class="actions">
      <button class="action-btn primary">
        <span class="action-icon">↓</span>
        Receive
      </button>
      <button class="action-btn">
        <span class="action-icon">↑</span>
        Send
      </button>
      <button class="action-btn">
        <span class="action-icon">⇄</span>
        Swap
      </button>
    </div>
    
    <!-- Tokens -->
    <div class="tokens-section">
      <div class="section-header">
        <div class="section-title">Assets</div>
      </div>
      
      <div class="token-list">
        <div class="token">
          <div class="token-icon eth">Ξ</div>
          <div class="token-info">
            <div class="token-name">Ethereum</div>
            <div class="token-subtitle">+3.2% ↑</div>
          </div>
          <div class="token-value">
            <div class="token-balance">2.4521 ETH</div>
            <div class="token-usd">$4,847.23</div>
          </div>
        </div>
        
        <div class="token">
          <div class="token-icon btc">₿</div>
          <div class="token-info">
            <div class="token-name">Bitcoin</div>
            <div class="token-subtitle">+1.8% ↑</div>
          </div>
          <div class="token-value">
            <div class="token-balance">0.0821 BTC</div>
            <div class="token-usd">$5,234.12</div>
          </div>
        </div>
        
        <div class="token">
          <div class="token-icon usdc">$</div>
          <div class="token-info">
            <div class="token-name">USDC</div>
            <div class="token-subtitle">Stablecoin</div>
          </div>
          <div class="token-value">
            <div class="token-balance">2,500.00</div>
            <div class="token-usd">$2,500.00</div>
          </div>
        </div>
        
        <div class="token">
          <div class="token-icon sol">◎</div>
          <div class="token-info">
            <div class="token-name">Solana</div>
            <div class="token-subtitle">+5.4% ↑</div>
          </div>
          <div class="token-value">
            <div class="token-balance">12.34 SOL</div>
            <div class="token-usd">$265.97</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Quick Access -->
    <div class="quick-access">
      <div class="section-header">
        <div class="section-title">Quick Access</div>
      </div>
      
      <div class="quick-grid">
        <div class="quick-card">
          <div class="quick-icon">📊</div>
          <div class="quick-label">Perps</div>
          <div class="quick-desc">Trade futures</div>
        </div>
        <div class="quick-card">
          <div class="quick-icon">💳</div>
          <div class="quick-label">Buy</div>
          <div class="quick-desc">Add crypto</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Bottom Nav -->
  <div class="nav">
    <div class="nav-item active">
      <span class="nav-icon">🏠</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">🔍</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">🤖</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">⚙️</span>
    </div>
  </div>
  
  <script>
    // Animate balance counting up
    function animateBalance(target) {
      const el = document.getElementById('balance');
      const duration = 1500;
      const start = 0;
      const startTime = performance.now();
      
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // Easing function
        const easeOut = 1 - Math.pow(1 - progress, 3);
        const current = start + (target - start) * easeOut;
        
        el.textContent = '$' + current.toLocaleString('en-US', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
        
        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }
      
      requestAnimationFrame(update);
    }
    
    // Start animation after load
    setTimeout(() => animateBalance(12847.32), 300);
    
    // Add touch feedback
    document.querySelectorAll('.action-btn, .token, .quick-card, .nav-item').forEach(el => {
      el.addEventListener('touchstart', () => {
        el.style.transform = 'scale(0.96)';
      });
      el.addEventListener('touchend', () => {
        el.style.transform = '';
      });
    });
  </script>
</body>
</html>
